<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Website</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            max-width: 500px;
            margin: 40px auto;
            padding: 32px 24px;
            background: #ffe4ec;
            border-radius: 16px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.07);
        }
        .headshot {
            display: block;
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%;
            margin: 0 auto 18px auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 3px solid #f8bbd0;
            background: #fff;
        }
        h1 {
            color: #d16ba5;
            text-align: center;
            margin-bottom: 10px;
        }
        .intro {
            text-align: center;
            color: #6d597a;
            font-size: 1.1em;
            margin-bottom: 22px;
        }
        a.cv-link {
            display: inline-block;
            margin-top: 18px;
            padding: 10px 22px;
            background: #d16ba5;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            box-shadow: 0 1px 4px rgba(209,107,165,0.08);
            transition: background 0.2s;
        }
        a.cv-link:hover {
            background: #b565a7;
        }
    </style>
</head>
<body>
    <img src="assets/images/headshot.jpg" alt="Headshot" class="headshot">
    <h1>Candy Xie</h1>
    <div class="intro">
        Hi! I'm Candy, a passionate [your profession/role] with a love for [your interests or expertise]. Welcome to my personal site!<br>
        Here you can find my CV and a little about me.
    </div>
    <a class="cv-link" href="assets/Resume_CandyXie_2025Sep.pdf" target="_blank">Download My CV (PDF)</a>
</body>
</html>
